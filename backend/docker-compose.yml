version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialpulse-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    # Pulls the rest of the credentials and API keys from .env directly
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: socialpulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  redis_data:
